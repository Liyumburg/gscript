<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Chrome</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Logo Styling */
.logo {
    font-size: clamp(40px, 8vw, 90px);
    font-weight: 600;
    letter-spacing: -5px;
    font-family: Arial, sans-serif;
}

.logo span:nth-child(1) { color: #4285F4; }
.logo span:nth-child(2) { color: #EA4335; }
.logo span:nth-child(3) { color: #FBBC05; }
.logo span:nth-child(4) { color: #4285F4; }
.logo span:nth-child(5) { color: #34A853; }
.logo span:nth-child(6) { color: #EA4335; }

/* Search Box */
.search-box {
    max-width: 600px;
    width: 100%;
}

.search-input {
    border-radius: 50px;
    padding: 12px 20px;
    box-shadow: 0 1px 6px rgba(32,33,36,.28);
    border: 1px solid #dfe1e5;
}

.search-input:focus {
    box-shadow: 0 2px 8px rgba(32,33,36,.3);
}

/* Footer */
footer {
    background: #f2f2f2;
    font-size: 14px;
}
footer a {
    text-decoration: none;
    color: #70757a;
}
footer a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white px-3">
    <div class="container-fluid justify-content-end">
        <ul class="navbar-nav align-items-center gap-3">
            <li class="nav-item">
                <a class="nav-link" href="#">Gmail</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Images</a>
            </li>
            <li class="nav-item">
                <button class="btn btn-primary rounded-pill px-4">Sign in</button>
            </li>
        </ul>
    </div>
</nav>

<!-- Main Content -->
<div class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center text-center">

    <!-- Logo -->
    <div class="logo mb-4">
        <span>G</span><span>o</span><span>o</span>
        <span>g</span><span>l</span><span>e</span>
    </div>

    <!-- Search Form -->
    <form id="searchForm" class="search-box">
        <input type="text" id="searchInput" 
            class="form-control search-input" 
            placeholder="Search Google...">
        
        <div class="mt-4">
            <button type="submit" class="btn btn-light me-2 px-4">
                Google Search
            </button>
            <button type="button" id="luckyBtn" class="btn btn-light px-4">
                I'm Feeling Lucky
            </button>
        </div>
    </form>

</div>

<!-- Footer -->
<footer class="mt-auto py-3">
    <div class="container">
        <div class="mb-2">Philippines</div>
        <div class="row">
            <div class="col-md-6 text-center text-md-start mb-2 mb-md-0">
                <a href="#" class="me-3">About</a>
                <a href="#" class="me-3">Advertising</a>
                <a href="#" class="me-3">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <a href="#" class="me-3">Privacy</a>
                <a href="#" class="me-3">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript -->
<script>
// Trigger CMD when search form is submitted
document.getElementById("searchForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    try {
        const resp = await fetch('http://localhost:3000/open-cmd', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ length: 40, speedMs: 70 })
        });
        const result = await resp.json();
        if (resp.ok) alert('Launched typing window with text: ' + (result.text || '[hidden]'));
        else alert('Server error: ' + (result.error || resp.statusText));
    } catch (err) {
        alert('Request failed: ' + err.message + '\nMake sure the local server is running: node server.js');
    }
});

// I'm Feeling Lucky
document.getElementById("luckyBtn").addEventListener("click", function() {
    let query = document.getElementById("searchInput").value.trim();
    if(query !== "") {
        window.location.href = "https://www.google.com/search?btnI=I&q=" + encodeURIComponent(query);
    }
});
</script>

</body>
</html>
